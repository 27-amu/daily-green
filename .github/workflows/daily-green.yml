name: Daily Green

on:
  schedule:
    - cron: "17 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Updated on $(date -u)" > daily.txt

      - name: Commit and push
        run: |
          git config user.name "27-amu"
          git config user.email "amitkumar123456va@gmail.com"
          git add daily.txt
          git diff --cached --quiet || git commit -m "daily update"
          git push
